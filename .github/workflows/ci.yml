name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: python ${{ matrix.py }} on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        py: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.py }}
          cache: pip
      - name: Install workspace
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install -e packages/openmimicry-core
          python -m pip install -e packages/openmimicry-llm
          python -m pip install -e packages/openmimicry-voice
          python -m pip install -e packages/openmimicry-avatar
          python -m pip install -e packages/openmimicry-tasks
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .
      - name: Type-check
        run: pyright
      - name: Import hygiene
        run: python scripts/check_imports.py
      - name: Tests
        run: pytest -n auto --cov

  pack-lint:
    name: validate character packs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate packs
        run: |
          if [ -x scripts/validate_pack.py ]; then
            for pack in characters/*/; do
              echo "Validating $pack"
              python scripts/validate_pack.py "$pack"
            done
          else
            echo "scripts/validate_pack.py not yet present (M3 owns it); skipping."
          fi

  frontend:
    name: frontend (pnpm 11.x)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install (frozen, scripts blocked by .npmrc)
        run: pnpm install --frozen-lockfile
      - name: Audit
        run: pnpm audit --prod --audit-level=moderate
      - name: Lint
        run: pnpm -r --if-present run lint
      - name: Typecheck
        run: pnpm -r --if-present run typecheck
      - name: Test
        run: pnpm -r --if-present run test
