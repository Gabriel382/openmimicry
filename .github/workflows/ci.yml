name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: python ${{ matrix.py }} on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        py: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.py }}
          cache: pip

      - name: Install workspace
        run: |
          python -m pip install --upgrade pip
          # Install workspace packages FIRST in editable mode so the root
          # `.[dev]` install below sees them as already-satisfied. Reversing
          # this order makes pip try to resolve `openmimicry-core` from
          # PyPI, which fails until the project ships there.
          python -m pip install -e packages/openmimicry-core
          python -m pip install -e packages/openmimicry-llm
          python -m pip install -e packages/openmimicry-voice
          python -m pip install -e packages/openmimicry-avatar
          python -m pip install -e packages/openmimicry-tasks
          python -m pip install -e ".[dev]"

      - name: Lint
        run: ruff check packages tests scripts/check_imports.py scripts/doctor.py scripts/m1_demo.py

      - name: Format check
        run: ruff format --check packages tests scripts/check_imports.py scripts/doctor.py scripts/m1_demo.py

      - name: Type-check
        run: pyright

      - name: Import hygiene
        run: python scripts/check_imports.py

      - name: Tests
        run: pytest -n auto --cov

  pack-lint:
    name: validate character packs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate packs
        run: |
          if [ -x scripts/validate_pack.py ]; then
            for pack in characters/*/; do
              echo "Validating $pack"
              python scripts/validate_pack.py "$pack"
            done
          else
            echo "scripts/validate_pack.py not yet present (M3 owns it); skipping."
          fi

  frontend:
    name: frontend (pnpm 11.x)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm 11 requires Node >= 22.13.
      - uses: actions/setup-node@v4
        with:
          node-version: "22.13"

      # Do not use pnpm/action-setup@v4 here.
      # It runs its installer with Node 20 and fails with pnpm 11.
      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@11.0.0 --activate

      - name: Show versions
        run: |
          node --version
          pnpm --version

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Audit
        run: pnpm audit --prod --audit-level=moderate

      - name: Lint
        run: pnpm -r --if-present run lint

      - name: Typecheck
        run: pnpm -r --if-present run typecheck

      - name: Test
        run: pnpm -r --if-present run test