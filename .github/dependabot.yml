version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    groups:
      python:
        patterns: ["*"]
  - package-ecosystem: pip
    directory: "/packages/openmimicry-core"
    schedule:
      interval: weekly
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
  # Note: GitHub's `npm` ecosystem also covers pnpm-lock.yaml. We keep it
  # but pin updates to "minor + patch" and ignore brand-new major bumps so
  # `minimum-release-age` in .npmrc gets a chance to catch poisoned versions.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      pnpm-workspace:
        patterns: ["*"]
  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      frontend:
        patterns: ["*"]
  - package-ecosystem: cargo
    directory: "/src-tauri"
    schedule:
      interval: weekly
    groups:
      cargo:
        patterns: ["*"]
