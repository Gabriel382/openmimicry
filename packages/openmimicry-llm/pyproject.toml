[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "openmimicry-llm"
version = "0.2.0a0"
description = "OpenMimicry LLM adapter: LiteLLMAdapter, LLMRouter, MockLLMAdapter."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Gabriel Henrique" }]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Typing :: Typed",
]
dependencies = [
    "openmimicry-core>=0.2.0a0",
    "jinja2>=3.1",
]

[project.optional-dependencies]
litellm = [
    "litellm>=1.40",
]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5",
]

[project.entry-points."openmimicry.contracts.llm"]
mock = "openmimicry.llm.mocks:make_mock_llm_adapter"
litellm = "openmimicry.llm.litellm_adapter:make_litellm_adapter"

[tool.setuptools]
package-dir = { "" = "src" }
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]
include = ["openmimicry*"]

[tool.setuptools.package-data]
"openmimicry.llm" = ["py.typed", "prompts/*.txt", "prompts/*.j2"]
