
name = "Demo Octopus"
version = "0.1.0"
default_state = "idle"
fallback_state = "idle"
assets_dir = "states"

[states.idle]
asset = "idle.png"
duration_ms = 2000
loop = true
speech_bubble_text = "Standing by."

[states.listening]
asset = "listening.png"
duration_ms = 2000
speech_bubble_text = "I am listening."

[states.thinking]
asset = "thinking.png"
duration_ms = 2500
speech_bubble_text = "Thinking..."

[states.speaking]
asset = "speaking.png"
duration_ms = 2000
speech_bubble_text = "Here is my answer."

[states.happy]
asset = "happy.png"
duration_ms = 1800
speech_bubble_text = "Nice!"

[states.error]
asset = "error.png"
duration_ms = 2200
speech_bubble_text = "Something went wrong."
